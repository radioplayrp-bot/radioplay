<style>
    .radio-jota-container {
        background-color: #000000;
        border: 2px solid #ffcc00;
        border-radius: 15px;
        padding: 25px;
        max-width: 850px;
        margin: 0 auto;
        text-align: center;
        font-family: 'Arial', sans-serif;
        box-shadow: 0 0 15px rgba(255, 204, 0, 0.15);
    }

    .radio-jota-title {
        color: #ffcc00;
        font-size: 1.8rem;
        letter-spacing: 2px;
        margin: 0 0 15px 0;
        text-transform: uppercase;
        font-weight: bold;
    }

    .radio-jota-subtitle {
        color: #ffffff;
        font-size: 1.2rem;
        font-weight: bold;
        margin: 0 0 20px 0;
    }

    /* Estilo do Botão de Play Geral */
    .radio-jota-play-button {
        max-width: 300px;
        margin: 20px auto;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: transform 0.2s ease;
    }

    .radio-jota-play-button:hover {
        transform: scale(1.03);
    }

    /* O Botão Interno que substitui a imagem que dava erro */
    .play-btn-visual {
        background: linear-gradient(135deg, #e6b800, #ffcc00);
        color: #000000;
        border-radius: 50%;
        width: 120px;
        height: 120px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 25px rgba(255, 204, 0, 0.4);
        font-size: 3.5rem;
        font-weight: bold;
        line-height: 1;
        padding-left: 10px; /* Ajuste para o triângulo do play ficar bem centralizado */
    }

    #jota-hidden-player {
        display: none;
    }

    /* EQUALIZADOR ANIMADO CORRIGIDO */
    .radio-jota-visualizer {
        display: flex;
        justify-content: center;
        gap: 4px;
        height: 35px;
        align-items: flex-end;
        margin: 25px 0;
    }

    .radio-jota-visualizer div {
        width: 6px;
        background-color: #ffcc00;
        border-radius: 1px;
    }

    /* Animação que faz as barras subirem e descerem */
    @keyframes pulse {
        0% { height: 8px; }
        50% { height: 35px; }
        100% { height: 8px; }
    }

    .radio-jota-buttons {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 25px;
        flex-wrap: wrap;
    }

    .radio-jota-buttons a {
        color: #ffffff;
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 20px;
        font-size: 0.9rem;
        font-weight: bold;
        display: inline-flex;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
</style>

<div class="radio-jota-container">
    
    <h2 class="radio-jota-title">RÁDIO PLAY</h2>

    <div class="radio-jota-subtitle">
        <span style="color: #ffcc00;">●</span> WEB RADIO<br>
        <span style="font-size: 1.1rem; color: #ffffff;">Rádio Play - Ao Vivo</span>
    </div>

    <div class="radio-jota-play-button" onclick="togglePlay()" id="jotaPlayBtn">
        <div class="play-btn-visual" id="btnIcon">▶</div>
    </div>

    <audio id="jota-hidden-player" preload="metadata">
        <source src="https://server22.srvsh.com.br:6752/stream" type="audio/mpeg">
        Seu navegador não suporta este player.
    </audio>

    <div class="radio-jota-visualizer" id="jotaVisualizer">
        <div style="height: 15px;"></div>
        <div style="height: 25px;"></div>
        <div style="height: 18px;"></div>
        <div style="height: 28px;"></div>
        <div style="height: 12px;"></div>
        <div style="height: 22px;"></div>
        <div style="height: 16px;"></div>
        <div style="height: 26px;"></div>
        <div style="height: 14px;"></div>
        <div style="height: 20px;"></div>
    </div>

    <div class="radio-jota-buttons">
        <a href="COLE_O_LINK_DO_ANDROID_AQUI" target="_blank" style="background-color: #689f38;">Android App</a>
        <a href="COLE_O_LINK_DO_IPHONE_AQUI" target="_blank" style="background-color: #b01a4a;">iPhone App</a>
        <a href="COLE_O_LINK_DO_WINDOWS_AQUI" target="_blank" style="background-color: #0078d7;">Windows App</a>
        <a href="COLE_OUTRO_LINK_AQUI" target="_blank" style="background-color: #444444;">Baixar App 4</a>
    </div>

</div>

<script>
    var jPlayer = document.getElementById('jota-hidden-player');
    var jBtnIcon = document.getElementById('btnIcon');
    var jBarsContainer = document.getElementById('jotaVisualizer');
    var jBars = jBarsContainer.getElementsByTagName('div');

    function togglePlay() {
        if (jPlayer.paused) {
            jPlayer.play();
            // Muda o ícone para Pause e ajusta o preenchimento interno
            jBtnIcon.innerHTML = "❚❚";
            jBtnIcon.style.paddingLeft = "0px"; 
            
            // Ativa o movimento real das barras douradas
            for (var i = 0; i < jBars.length; i++) {
                jBars[i].style.animation = "pulse " + (Math.random() * 0.4 + 0.4) + "s infinite ease-in-out";
                jBars[i].style.animationDelay = (i * 0.08) + "s";
            }
        } else {
            jPlayer.pause();
            // Volta o ícone para Play
            jBtnIcon.innerHTML = "▶";
            jBtnIcon.style.paddingLeft = "10px";
            
            // Pausa o movimento das barras
            for (var i = 0; i < jBars.length; i++) {
                jBars[i].style.animation = "none";
                jBars[i].style.height = (i % 2 == 0 ? "15" : "22") + "px";
            }
        }
    }
</script>

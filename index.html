<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rádio Play</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  text-align: center;
}

/* LOGO */
.logo-img {
  width: 180px;
  border-radius: 50%;
  box-shadow: 0 0 25px gold;
  margin-top: 30px;
}

/* TEXTO */
h1 {
  color: gold;
  margin: 10px 0;
}

.slogan {
  color: #ccc;
  margin-bottom: 30px;
}

/* PLAYER */
.player {
  margin: 40px 0;
}

.play-btn {
  background: gold;
  color: black;
  border: none;
  padding: 15px 25px;
  font-size: 18px;
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 0 20px gold;
  transition: 0.3s;
}

.play-btn:hover {
  transform: scale(1.1);
}

/* SEÇÕES */
.section {
  max-width: 600px;
  margin: 40px auto;
}

.card {
  background: #111;
  padding: 15px;
  margin: 10px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(255,215,0,0.2);
}

/* BOTÃO WHATSAPP */
.whatsapp {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 20px;
  background: #25D366;
  color: #fff;
  text-decoration: none;
  border-radius: 8px;
}

footer {
  margin: 40px 0;
  color: #777;
}
</style>
</head>

<body>

<img src="https://i.postimg.cc/dQ505BSP/LOGO-REDONDO-200-X-200.png">

<h1>Rádio Play</h1>
<div class="slogan">Dê um play na vida 🎧</div>

<div class="player">
  <h2>🔴 AO VIVO</h2>
  <button class="play-btn" onclick="tocar()">▶️ Ouvir Rádio</button>
  <audio id="radio" src="https://server16.srvsh.com.br:7890/stream"></audio>
</div>

<a class="whatsapp" href="https://wa.me/5583991039161?text=Olá,%20quero%20pedir%20uma%20música!" target="_blank">
  Pedir música no WhatsApp
</a>

<div class="section">
  <h2>📻 Programas</h2>

  <div class="card">
    <h3>Show da manhã 8:00</h3>
    <p>Show da play 14:00 🎶</p>
  </div>

  <div class="card">
    <h3>Madrugada play 00:00</h3>
    <p>Desperta play 4;00 🌾</p>
  </div>
</div>

<div class="section">
  <h2>📅 Programação</h2>

  <div class="card">
    <p>Manhã: Show da manhã</p>
    <p>Tarde: Show da play</p>
    <p>Noite:Madrugada play</p>
  </div>
</div>

<footer>
  © 2026 Rádio Play
</footer>

<script>
function tocar() {
  document.getElementById("radio").play();
}
</script>

</body>
</html>

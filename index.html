<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rádio Play</title>
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: #fff;
            text-align: center;
            overflow-x: hidden;
        }
        .player-container { 
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .player-container img { 
            max-width: 80%; 
            width: 200px; 
            filter: drop-shadow(0 0 20px #FFD700); 
            margin-bottom: 10px; 
        }
        h1 { color: #FFD700; margin: 10px 0; font-size: 28px; }

        /* BARRINHAS DE ESPECTRO */
        .visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 40px;
            gap: 3px;
            margin: 15px 0;
        }
        .bar {
            width: 5px;
            background: #FFD700;
            animation: bounce 1s ease-in-out infinite alternate;
        }
        @keyframes bounce {
            0% { height: 5px; }
            100% { height: 40px; }
        }
        .bar:nth-child(2n) { animation-duration: 0.6s; }
        .bar:nth-child(3n) { animation-duration: 0.8s; }
        .bar:nth-child(4n) { animation-duration: 1.1s; }

        .play-btn { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            border: none; 
            background: linear-gradient(45deg,#FFD700,#ffaa00); 
            font-size: 40px; 
            color: #000; 
            cursor: pointer; 
            box-shadow: 0 0 30px #FFD700; 
            margin: 20px 0; 
            transition: 0.3s;
        }
        .play-btn:hover { transform: scale(1.1); }
        
        .volume-slider { width: 80%; max-width: 250px; cursor: pointer; accent-color: #FFD700; }
        #musica { margin: 10px 0; color: #FFD700; font-weight: bold; font-size: 18px; }

        .social-links { 
            margin-top: 20px;
            display: flex; 
            justify-content: center;
            gap: 15px; 
        }
        .social-links a { 
            text-decoration: none; 
            width: 45px; 
            height: 45px; 
            line-height: 45px; 
            border-radius: 50%; 
            color: #fff; 
            display: inline-block; 
            font-size: 20px; 
            font-weight: bold;
        }
        .whatsapp { background: #25D366; }
        .youtube { background: #FF0000; }
        .facebook { background: #1877F2; }

        .gif-container { position: fixed; bottom: 20px; right: 20px; }
        .gif-container img { width: 170px; border-radius: 15px; box-shadow: 0 0 15px #FFD700; }

        @media (max-width: 600px) {
            .gif-container { display: none; }
            .player-container { min-height: 100vh; }
        }
    </style>
</head>
<body>

    <div class="player-container">
        <img alt="Logo Rádio Play" src="https://i.postimg.cc/BQ647194/LOGOTIPO_App_REDONDOS2.png">
        <h1>RÁDIO PLAY</h1>
        
        <div class="visualizer">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>

        <div id="musica">Ao Vivo 🎶</div>

        <button class="play-btn" id="btn" onclick="togglePlay()">▶</button>
        <br>
        <input class="volume-slider" type="range" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
        
        <div class="social-links">
            <a class="whatsapp" href="https://wa.me/5583991039161" target="_blank">W</a>
            <a class="youtube" href="https://www.youtube.com/@RadioPlay77" target="_blank">Y</a>
            <a class="facebook" href="https://www.facebook.com/share/1BC788EFdF/" target="_blank">F</a>
        </div>
    </div>

    <audio id="radio-stream" src="https://server16.srvsh.com.br:7890/stream"></audio>

    <div class="gif-container">
        <img src="https://i.postimg.cc/xdPB4mcH/anigif-02.gif">
    </div>

    <script>
        var audio = document.getElementById("radio-stream");
        var btn = document.getElementById("btn");

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                btn.innerHTML = "||";
            } else {
                audio.pause();
                btn.innerHTML = "▶";
            }
        }
        function setVolume(v) { 
            audio.volume = v; 
        }
    </script>
</body>
</html>

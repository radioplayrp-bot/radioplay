<style>
    /* ISSO DEIXA A PÁGINA INTEIRA PRETA */
    body {
        background-color: #000000 !important;
        margin: 0;
        padding: 20px;
    }

    .radio-jota-container {
        background-color: #000000;
        border: 2px solid #b8860b; /* Borda em Bronze/Ouro Velho */
        border-radius: 15px;
        padding: 25px;
        max-width: 850px;
        margin: 0 auto;
        text-align: center;
        font-family: 'Arial', sans-serif;
        box-shadow: 0 0 15px rgba(184, 134, 11, 0.2);
    }

    .radio-jota-title {
        color: #cd7f32; /* Bronze Metálico */
        font-size: 1.8rem;
        letter-spacing: 2px;
        margin: 0 0 15px 0;
        text-transform: uppercase;
        font-weight: bold;
    }

    .radio-jota-subtitle {
        color: #ffffff;
        font-size: 1.2rem;
        font-weight: bold;
        margin: 0 0 20px 0;
    }

    /* Estilo do Botão de Play Geral */
    .radio-jota-play-button {
        max-width: 300px;
        margin: 20px auto;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: transform 0.2s ease;
    }

    .radio-jota-play-button:hover {
        transform: scale(1.03);
    }

    /* Botão Central na cor Bronze Escuro Metálico */
    .play-btn-visual {
        background: linear-gradient(135deg, #8c6239, #cd7f32);
        color: #000000;
        border-radius: 50%;
        width: 120px;
        height: 120px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 0 25px rgba(205, 127, 50, 0.4);
        font-size: 3.5rem;
        font-weight: bold;
        line-height: 1;
        padding-left: 10px;
    }

    #jota-hidden-player {
        display: none;
    }

    /* EQUALIZADOR ANIMADO EM TOM DE BRONZE */
    .radio-jota-visualizer {
        display: flex;
        justify-content: center;
        gap: 4px;
        height: 35px;
        align-items: flex-end;
        margin: 25px 0;
    }

    .radio-jota-visualizer div {
        width: 6px;
        background-color: #cd7f32;
        border-radius: 1px;
    }

    /* Animação que faz as barras subirem e descerem */
    @keyframes pulse {
        0% { height: 8px; }
        50% { height: 35px; }
        100% { height: 8px; }
    }

    /* BLOCO DOS PARCEIROS AJUSTADO E ALINHADO COM OS BOTÕES */
    .radio-jota-partners {
        max-width: 530px; /* Largura limite para casar certinho com o tamanho dos botões */
        margin: 25px auto 15px auto; /* Centralizado, logo acima dos botões */
        background-color: #111111;
        padding: 10px;
        border-radius: 8px;
        border: 1px dashed #444444;
        box-sizing: border-box;
    }

    .radio-jota-partners img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
        border-radius: 4px;
    }

    /* Botões dos Aplicativos */
    .radio-jota-buttons {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 0;
        flex-wrap: wrap;
        max-width: 530px; /* Mesma largura máxima dos parceiros para alinhar */
        margin: 0 auto;
    }

    .radio-jota-buttons a {
        color: #ffffff;
        text-decoration: none;
        padding: 10px 18px;
        border-radius: 20px;
        font-size: 0.9rem;
        font-weight: bold;
        display: inline-flex;
        align-items: center;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
</style>

<div class="radio-jota-container">
    
    <h2 class="radio-jota-title">RÁDIO PLAY</h2>

    <div class="radio-jota-subtitle">
        <span style="color: #cd7f32;">●</span> WEB RADIO<br>
        <span style="font-size: 1.1rem; color: #ffffff;">Rádio Play - Ao Vivo</span>
    </div>

    <div class="radio-jota-play-button" onclick="togglePlay()" id="jotaPlayBtn">
        <div class="play-btn-visual" id="btnIcon">▶</div>
    </div>

    <audio id="jota-hidden-player" preload="metadata">
        <source src="https://server22.srvsh.com.br:6752/stream" type="audio/mpeg">
        Seu navegador não suporta este player.
    </audio>

    <div class="radio-jota-visualizer" id="jotaVisualizer">
        <div style="height: 15px;"></div>
        <div style="height: 25px;"></div>
        <div style="height: 18px;"></div>
        <div style="height: 28px;"></div>
        <div style="height: 12px;"></div>
        <div style="height: 22px;"></div>
        <div style="height: 16px;"></div>
        <div style="height: 26px;"></div>
        <div style="height: 14px;"></div>
        <div style="height: 20px;"></div>
    </div>

    <div class="radio-jota-partners">
        <img src="https://i.postimg.cc/xdPB4mcH/anigif-02.gif" alt="Banner Parceiros">
    </div>

    <div class="radio-jota-buttons">
        <a href="https://player.srvsh.com.br/player-app-multi-plataforma/6752" target="_blank" style="background-color: #689f38;">Android App</a>
        <a href="https://player.srvsh.com.br/player-app-multi-plataforma/6752" target="_blank" style="background-color: #b01a4a;">iPhone App</a>
        <a href="https://player.srvsh.com.br/player-app-multi-plataforma/6752" target="_blank" style="background-color: #0078d7;">Windows App</a>
        <a href="https://play.google.com/store/apps/details?id=br.com.radios.radiosmobile.radiosnet" target="_blank" style="background-color: #444444;">Baixar App RadiosNet</a>
    </div>

</div>

<script>
    var jPlayer = document.getElementById('jota-hidden-player');
    var jBtnIcon = document.getElementById('btnIcon');
    var jBarsContainer = document.getElementById('jotaVisualizer');
    var jBars = jBarsContainer.getElementsByTagName('div');

    function togglePlay() {
        if (jPlayer.paused) {
            jPlayer.play();
            jBtnIcon.innerHTML = "❚❚";
            jBtnIcon.style.paddingLeft = "0px"; 
            
            for (var i = 0; i < jBars.length; i++) {
                jBars[i].style.animation = "pulse " + (Math.random() * 0.4 + 0.4) + "s infinite ease-in-out";
                jBars[i].style.animationDelay = (i * 0.08) + "s";
            }
        } else {
            jPlayer.pause();
            jBtnIcon.innerHTML = "▶";
            jBtnIcon.style.paddingLeft = "10px";
            
            for (var i = 0; i < jBars.length; i++) {
                jBars[i].style.animation = "none";
                jBars[i].style.height = (i % 2 == 0 ? "15" : "22") + "px";
            }
        }
    }
</script>
